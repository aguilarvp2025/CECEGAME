<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Outlaw's Word - Nivel {{ nivel }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_outlaw.css') }}">
    <style>
        .game-info { color: #d0c4b4; font-size: 20px; margin-bottom: 20px; text-shadow: 0 0 5px rgba(0,0,0,0.8); }
        .hint-text { color: #fff; font-size: 24px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        .lives { color: #8b0000; font-size: 28px; margin-bottom: 20px; font-weight: bold; text-shadow: 0 0 10px rgba(0,0,0,0.9); }
        .flashes { color: #ffeb3b; list-style-type: none; margin-bottom: 15px; font-size: 18px; text-shadow: 0 0 5px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="login-ui">
        <div class="title" style="font-size: 60px;">LEVEL {{ nivel }}</div>
        <div class="subtitle">★★★ THE CHALLENGE ★★★</div>
        
        <div class="lives">♥ Vidas: {{ vidas }}</div>
        
        <div class="hint-text">"{{ pista }}"</div>
        
        <div class="game-info">
            [ Imagen: {{ imagen }} ]
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul class="flashes">
            {% for category, message in messages %}
              <li>{{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}
        
        <form class="form" action="{{ url_for('game_bp.procesar_juego') }}" method="post">
            <input type="text" name="palabra_usuario" placeholder="TU RESPUESTA" autocomplete="off" required>
            <button type="submit">DISPARAR</button>
        </form>
    </div>
</body>
</html>
