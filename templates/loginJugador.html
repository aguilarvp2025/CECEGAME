<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <title>Outlaw Access</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_outlaw.css') }}">

</head>
<body>
    <audio id="bg-music" loop>
        <source 
            src="{{ url_for('static', filename='audio/OutlawCowboymusic.mp3') }}"
            type="audio/mpeg">
    </audio>

    <!-- FONDO -->
    <div class="bg"></div>

    <!-- LOGIN MINIMAL -->
    <div class="login-ui">

        <div class="title">
            WANTED
        </div>

        <div class="subtitle">
            ★★★ DEAD OR ALIVE ★★★
        </div>

        <form class="form" action="/loginJugador" method="post">

            <input type="text" name="alias" placeholder="USER NAME" required>

            <input type="password" name="password" placeholder="PASSWORD" required>

            <button type="submit">
                LETS GO 
            </button>

        </form>

    </div>
    <script>

        const music = document.getElementById("bg-music");

        music.volume = 0.25;

        document.addEventListener("click", () => {

            music.play();

        }, { once:true });

    </script>

</body>
</html>
