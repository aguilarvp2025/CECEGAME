<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sheriff Access </title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login_sheriff.css') }}">
</head>
<body>

  <div class="background"></div>

  <div class="login-container">
    <div class="card">

      <div class="badge">★ SHERIFF OFFICE ★</div>
      <h1 class="title">ACCESS</h1>
      <p class="subtitle">Sistema de administración autorizado</p>

      <!-- Mensajes Flash de advertencia/error -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div style="color: #ffeb3b; margin-bottom: 15px; font-size: 14px; text-align: center;">
            {% for category, message in messages %}
              {{ message }}
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <!-- Formulario conectado a la ruta de inicio de sesión -->
      <form action="{{ url_for('login_Gamer') }}" method="POST">
        <label>Identificación del Sheriff (Correo)</label>
        <input type="text" name="alias" placeholder="admin@juego.com" required>

        <label>Código de acceso</label>
        <input type="password" name="password" placeholder="••••••••" required>

        <button type="submit">Ingresar al despacho</button>
      </form>

      <p class="footer">Solo personal autorizado del condado</p>
    </div>
  </div>

</body>
</html>
